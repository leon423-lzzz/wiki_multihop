<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotpotQA 多跳推理可视化系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .graph-container { width: 100%; height: 500px; background: #fafafa; border-radius: 12px; border: 1px solid #e2e8f0; }
        .node circle { stroke: #fff; stroke-width: 2px; cursor: pointer; transition: all 0.3s; }
        .node:hover circle { stroke: #6366f1; stroke-width: 3px; filter: drop-shadow(0 4px 6px rgba(99,102,241,0.3)); }
        .node text { font-size: 11px; pointer-events: none; text-anchor: middle; font-family: monospace; }
        .link { stroke: #94a3b8; stroke-opacity: 0.6; stroke-width: 1.5px; transition: all 0.3s; }
        .link.active { stroke: #6366f1; stroke-opacity: 1; stroke-width: 2.5px; }
        .node.question circle { fill: #4f46e5; }
        .node.doc-1 circle { fill: #0ea5e9; }
        .node.doc-2 circle { fill: #10b981; }
        .node.doc-3 circle { fill: #f59e0b; }
        .node.doc-4 circle { fill: #ef4444; }
        .node.doc-5 circle { fill: #8b5cf6; }
        .cluster-bar { transition: width 0.8s ease-out; }
        .reasoning-step { border-left: 3px solid transparent; transition: all 0.3s; }
        .reasoning-step:hover { border-left-color: #6366f1; background: #f8fafc; }
        .mode-badge { position: fixed; top: 16px; right: 16px; z-index: 50; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="mode-badge">
        <span class="px-3 py-1.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-700 border border-indigo-200">
            <i class="fas fa-database mr-1"></i>GitHub Pages 演示模式
        </span>
    </div>
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">
                <i class="fas fa-project-diagram text-indigo-600 mr-3"></i>
                HotpotQA 多跳推理可视化系统
            </h1>
            <p class="text-slate-500">基于 ArangoDB 图数据库的多跳查询、检索与聚类分析</p>
        </header>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                    <h3 class="text-sm font-semibold text-slate-600 mb-4 uppercase tracking-wide"><i class="fas fa-database mr-2"></i>数据库概览</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-indigo-50 rounded-lg p-3 text-center"><div class="text-2xl font-bold text-indigo-600" id="statQ">-</div><div class="text-xs text-slate-500">问题</div></div>
                        <div class="bg-emerald-50 rounded-lg p-3 text-center"><div class="text-2xl font-bold text-emerald-600" id="statD">-</div><div class="text-xs text-slate-500">文档</div></div>
                        <div class="bg-amber-50 rounded-lg p-3 text-center"><div class="text-2xl font-bold text-amber-600" id="statS">-</div><div class="text-xs text-slate-500">支持边</div></div>
                        <div class="bg-rose-50 rounded-lg p-3 text-center"><div class="text-2xl font-bold text-rose-600" id="statF">-</div><div class="text-xs text-slate-500">跟随边</div></div>
                    </div>
                </div>
                <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                    <h3 class="text-sm font-semibold text-slate-600 mb-4 uppercase tracking-wide"><i class="fas fa-chart-bar mr-2"></i>文档引用热度聚类</h3>
                    <div id="clusterChart" class="space-y-3"><div class="text-center text-slate-400 text-sm py-4">加载中...</div></div>
                </div>
            </div>
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                    <div class="flex gap-3 mb-4">
                        <div class="flex-1 relative">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="searchInput" class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none" placeholder="搜索问题关键词（如：football, president, war...）" onkeypress="if(event.key==='Enter') doSearch()">
                        </div>
                        <button onclick="doSearch()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium text-sm">搜索</button>
                        <button onclick="randomExample()" class="px-5 py-2.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition font-medium text-sm"><i class="fas fa-dice mr-1"></i>随机</button>
                    </div>
                    <div id="searchResults" class="hidden">
                        <div class="flex justify-between items-center mb-3"><span class="text-sm font-semibold text-slate-600">搜索结果</span><span class="text-xs text-slate-400" id="resultCount"></span></div>
                        <div id="resultsList" class="space-y-2 max-h-64 overflow-y-auto pr-1"></div>
                    </div>
                    <div id="searchEmpty" class="text-center py-8 text-slate-400 text-sm">输入关键词或点击"随机"开始探索</div>
                </div>
                <div id="questionInfo" class="hidden bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="flex gap-2 mb-2">
                                <span id="qType" class="px-2 py-0.5 rounded text-xs font-medium bg-indigo-100 text-indigo-700"></span>
                                <span id="qLevel" class="px-2 py-0.5 rounded text-xs font-medium bg-amber-100 text-amber-700"></span>
                            </div>
                            <h3 id="qText" class="text-lg font-bold text-slate-800 leading-snug"></h3>
                        </div>
                        <div class="text-right"><div class="text-xs text-slate-400 mb-1">答案</div><div id="qAnswer" class="text-lg font-bold text-emerald-600"></div></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="vizSection" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 space-y-4">
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                        <h3 class="text-sm font-semibold text-slate-600 mb-4 uppercase tracking-wide"><i class="fas fa-list-ol mr-2"></i>多跳推理过程</h3>
                        <div id="reasoningSteps" class="space-y-3"></div>
                    </div>
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                        <h3 class="text-sm font-semibold text-slate-600 mb-4 uppercase tracking-wide"><i class="fas fa-file-alt mr-2"></i>支持文档</h3>
                        <div id="supportDocs" class="space-y-3 max-h-80 overflow-y-auto"></div>
                    </div>
                </div>
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-slate-200">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-sm font-semibold text-slate-600 uppercase tracking-wide"><i class="fas fa-sitemap mr-2"></i>推理链图结构</h3>
                            <div class="flex gap-3 text-xs">
                                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-indigo-600"></span>问题</span>
                                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-sky-500"></span>1跳</span>
                                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-emerald-500"></span>2跳</span>
                                <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-amber-500"></span>3跳+</span>
                            </div>
                        </div>
                        <div id="graphViz" class="graph-container"></div>
                        <p class="text-xs text-slate-400 mt-2 text-center">节点可拖拽，滚轮缩放，点击节点高亮路径</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API = './data';
        document.addEventListener('DOMContentLoaded', () => { loadStats(); loadCluster(); });
        async function loadStats() {
            try {
                const res = await fetch(`${API}/stats.json`);
                const data = await res.json();
                document.getElementById('statQ').textContent = data.questions.toLocaleString();
                document.getElementById('statD').textContent = data.documents.toLocaleString();
                document.getElementById('statS').textContent = data.supports.toLocaleString();
                document.getElementById('statF').textContent = data.follows.toLocaleString();
            } catch(e) { console.error(e); }
        }
        async function loadCluster() {
            try {
                const res = await fetch(`${API}/cluster.json`);
                const data = await res.json();
                const max = Math.max(...data.map(d => d.count));
                document.getElementById('clusterChart').innerHTML = data.map(item => {
                    const pct = (item.count / max * 100).toFixed(1);
                    const color = item.bucket < 2 ? 'bg-emerald-500' : item.bucket < 5 ? 'bg-indigo-500' : item.bucket < 10 ? 'bg-amber-500' : 'bg-rose-500';
                    return `<div><div class="flex justify-between text-xs mb-1"><span class="text-slate-600">${item.min_refs}-${item.max_refs} 次引用</span><span class="font-bold text-slate-700">${item.count} 篇</span></div><div class="w-full bg-slate-100 rounded-full h-2"><div class="cluster-bar ${color} h-2 rounded-full" style="width: ${pct}%"></div></div></div>`;
                }).join('');
            } catch(e) { console.error(e); }
        }
        async function doSearch() {
            const kw = document.getElementById('searchInput').value.trim();
            if (!kw) return;
            document.getElementById('searchResults').classList.remove('hidden');
            document.getElementById('searchEmpty').classList.add('hidden');
            document.getElementById('resultsList').innerHTML = '<div class="text-center py-4 text-slate-400"><i class="fas fa-spinner fa-spin"></i></div>';
            try {
                const res = await fetch(`${API}/search.json`);
                let data = await res.json();
                if (kw) data = data.filter(q => q.question.toLowerCase().includes(kw.toLowerCase()));
                document.getElementById('resultCount').textContent = `${data.length} 条结果`;
                document.getElementById('resultsList').innerHTML = data.map(q => `
                    <div class="p-3 rounded-lg border border-slate-100 hover:border-indigo-300 hover:bg-indigo-50 cursor-pointer transition group" onclick="loadChain('${q.id}')">
                        <div class="flex justify-between items-start mb-1"><span class="text-xs font-mono text-slate-400">#${q.id}</span><div class="flex gap-1"><span class="px-1.5 py-0.5 rounded text-xs ${q.type==='bridge'?'bg-indigo-100 text-indigo-700':'bg-amber-100 text-amber-700'}">${q.type}</span><span class="px-1.5 py-0.5 rounded text-xs bg-slate-100 text-slate-600">L${q.level}</span></div></div>
                        <p class="text-sm text-slate-700 font-medium line-clamp-2 group-hover:text-indigo-700">${q.question}</p>
                    </div>`).join('');
            } catch(e) { document.getElementById('resultsList').innerHTML = '<div class="text-center py-4 text-red-400">请求失败</div>'; }
        }
        async function randomExample() {
            document.getElementById('searchResults').classList.remove('hidden');
            document.getElementById('searchEmpty').classList.add('hidden');
            document.getElementById('resultsList').innerHTML = '<div class="text-center py-4 text-slate-400"><i class="fas fa-spinner fa-spin"></i></div>';
            try {
                const res = await fetch(`${API}/examples.json`);
                const data = await res.json();
                document.getElementById('resultCount').textContent = '随机示例（5条）';
                document.getElementById('resultsList').innerHTML = data.map(q => `
                    <div class="p-3 rounded-lg border border-slate-100 hover:border-emerald-300 hover:bg-emerald-50 cursor-pointer transition group" onclick="loadChain('${q.id}')">
                        <div class="flex justify-between items-start mb-1"><span class="text-xs font-mono text-slate-400">#${q.id}</span><span class="px-1.5 py-0.5 rounded text-xs ${q.type==='bridge'?'bg-indigo-100 text-indigo-700':'bg-amber-100 text-amber-700'}">${q.type}</span></div>
                        <p class="text-sm text-slate-700 font-medium line-clamp-2 group-hover:text-emerald-700">${q.question}</p>
                    </div>`).join('');
            } catch(e) { document.getElementById('resultsList').innerHTML = '<div class="text-center py-4 text-red-400">请求失败</div>'; }
        }
        async function loadChain(qId) {
            document.getElementById('vizSection').classList.remove('hidden');
            document.getElementById('vizSection').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('reasoningSteps').innerHTML = '<div class="text-center py-4 text-slate-400"><i class="fas fa-spinner fa-spin"></i> 加载推理链...</div>';
            document.getElementById('supportDocs').innerHTML = '';
            document.getElementById('graphViz').innerHTML = '';
            try {
                const res = await fetch(`${API}/chain.json`);
                const data = await res.json();
                if (!data.question) { document.getElementById('reasoningSteps').innerHTML = '<div class="text-red-400">未找到该问题的推理链</div>'; return; }
                document.getElementById('questionInfo').classList.remove('hidden');
                document.getElementById('qText').textContent = data.question;
                document.getElementById('qAnswer').textContent = data.answer;
                document.getElementById('qType').textContent = data.type || 'unknown';
                document.getElementById('qLevel').textContent = `Level ${data.level || '?'}`;
                renderDocs(data.documents || []);
                const graphData = buildGraphData(qId, data.hop_path || [], data.documents || []);
                renderSteps(graphData);
                renderGraph(graphData);
            } catch(e) { document.getElementById('reasoningSteps').innerHTML = '<div class="text-red-400">加载失败</div>'; console.error(e); }
        }
        function buildGraphData(qId, hopPath, documents) {
            const nodes = [], links = [], nodeSet = new Set();
            nodes.push({ id: qId, type: 'question', label: 'Q', hop: 0, name: qId }); nodeSet.add(qId);
            hopPath.forEach(p => {
                if (!nodeSet.has(p.to)) { nodes.push({ id: p.to, type: `doc-${Math.min(p.hop, 5)}`, label: `D${p.hop}`, hop: p.hop, name: p.to }); nodeSet.add(p.to); }
                const fromId = p.hop === 1 ? qId : p.from;
                links.push({ source: fromId, target: p.to, hop: p.hop });
            });
            documents.forEach(doc => { const node = nodes.find(n => n.id === doc.doc_key); if (node) { node.title = doc.title; node.sentence = doc.sentence_text; node.sentenceIdx = doc.sentence_idx; } });
            return { nodes, links };
        }
        function renderSteps(graphData) {
            const steps = graphData.nodes.filter(n => n.hop > 0).sort((a, b) => a.hop - b.hop);
            const grouped = {};
            steps.forEach(s => { if (!grouped[s.hop]) grouped[s.hop] = []; grouped[s.hop].push(s); });
            const html = Object.keys(grouped).sort((a,b)=>a-b).map(hop => {
                const docs = grouped[hop];
                return `<div class="reasoning-step rounded-lg p-3" data-hop="${hop}"><div class="flex items-center gap-2 mb-2"><span class="w-6 h-6 rounded-full bg-indigo-600 text-white text-xs flex items-center justify-center font-bold">${hop}</span><span class="text-sm font-semibold text-slate-700">第 ${hop} 跳推理</span><span class="text-xs text-slate-400">(${docs.length} 个文档)</span></div><div class="space-y-2 ml-8">${docs.map(d => `<div class="text-xs text-slate-600 bg-slate-50 rounded p-2"><span class="font-mono text-slate-400">${d.id}</span>${d.sentence ? `<p class="mt-1 line-clamp-2">${d.sentence}</p>` : ''}</div>`).join('')}</div></div>`;
            }).join('');
            document.getElementById('reasoningSteps').innerHTML = html || '<div class="text-slate-400">无多跳路径数据</div>';
        }
        function renderDocs(docs) {
            document.getElementById('supportDocs').innerHTML = docs.map(d => `<div class="p-3 rounded-lg border-l-4 border-indigo-400 bg-slate-50"><div class="flex justify-between items-start mb-1"><span class="text-xs font-mono text-slate-500">${d.doc_key}</span><span class="text-xs text-slate-400">Sentence ${d.sentence_idx}</span></div><p class="text-sm text-slate-700 leading-relaxed">${d.sentence_text}</p><p class="text-xs text-slate-500 mt-1 italic">${d.title || '无标题'}</p></div>`).join('') || '<div class="text-slate-400 text-sm">无支持文档</div>';
        }
        function renderGraph(graphData) {
            const container = document.getElementById('graphViz');
            const width = container.clientWidth, height = 500;
            const svg = d3.select('#graphViz').append('svg').attr('width', width).attr('height', height).attr('viewBox', [0, 0, width, height]);
            const g = svg.append('g');
            svg.call(d3.zoom().extent([[0, 0], [width, height]]).scaleExtent([0.5, 4]).on('zoom', (event) => g.attr('transform', event.transform)));
            const simulation = d3.forceSimulation(graphData.nodes).force('link', d3.forceLink(graphData.links).id(d => d.id).distance(100)).force('charge', d3.forceManyBody().strength(-400)).force('center', d3.forceCenter(width / 2, height / 2)).force('collision', d3.forceCollide().radius(40));
            const link = g.append('g').selectAll('line').data(graphData.links).join('line').attr('class', 'link');
            const node = g.append('g').selectAll('g').data(graphData.nodes).join('g').attr('class', d => `node ${d.type}`).call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended));
            node.append('circle').attr('r', d => d.type === 'question' ? 25 : 18);
            node.append('text').attr('dy', d => d.type === 'question' ? 35 : 28).text(d => d.name.length > 12 ? d.name.slice(0, 10) + '..' : d.name);
            node.append('title').text(d => `${d.id}${d.sentence ? '\\n' + d.sentence.slice(0, 100) : ''}`);
            node.on('click', (event, d) => {
                link.classed('active', false); node.selectAll('circle').attr('stroke', '#fff').attr('stroke-width', 2);
                const connected = new Set();
                link.filter(l => { if (l.source.id === d.id || l.target.id === d.id) { connected.add(l.source.id); connected.add(l.target.id); return true; } return false; }).classed('active', true);
                node.filter(n => connected.has(n.id) || n.id === d.id).selectAll('circle').attr('stroke', '#6366f1').attr('stroke-width', 3);
            });
            simulation.on('tick', () => { link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y); node.attr('transform', d => `translate(${d.x},${d.y})`); });
            function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
            function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
            function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
        }
    </script>
</body>
</html>
